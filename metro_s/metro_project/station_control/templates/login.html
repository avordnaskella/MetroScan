<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — МетроСкан</title>
    <link href="


https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

       
        .login-container {
            background: #131a24;
            border-radius: 24px;
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        
        .login-logo {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 36px;
            background: linear-gradient(135deg, #00d4ff, #0070e0);
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 24px rgba(0, 180, 255, 0.3);
            flex-shrink: 0;
        }

        .login-logo h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 60%, #6ab7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-logo .sub {
            font-size: 13px;
            color: #6a7f9e;
            font-weight: 400;
            margin-top: 2px;
            display: block;
            -webkit-text-fill-color: #6a7f9e;
        }

     
        .login-title {
            font-size: 20px;
            font-weight: 600;
            color: #e8edf5;
            margin-bottom: 6px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #6a7f9e;
            margin-bottom: 28px;
        }

       
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #6a7f9e;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            background: #0b0e14;
            border: 1px solid #1e2a36;
            color: #e8edf5;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #00aaff;
            box-shadow: 0 0 0 4px rgba(0, 170, 255, 0.15);
        }

        .form-group input::placeholder {
            color: #3a4a5e;
        }

        
        .error-message {
            background: rgba(255, 70, 70, 0.12);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 70, 70, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error-message .icon {
            font-size: 20px;
        }

  
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #0070e0, #00aaff);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 24px rgba(0, 120, 255, 0.3);
            margin-top: 6px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 36px rgba(0, 120, 255, 0.45);
        }

        .btn-login:active {
            transform: translateY(0);
        }

       
        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #4a5a6e;
        }

        .login-footer a {
            color: #6ab7ff;
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px 28px;
            }

            .login-logo h1 {
                font-size: 22px;
            }

            .logo-icon {
                width: 48px;
                height: 48px;
                font-size: 28px;
            }

            .login-title {
                font-size: 18px;
            }

            .btn-login {
                font-size: 15px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    

    <!-- ЗАГОЛОВОК -->
    <div class="login-title">Вход в систему</div>
    <div class="login-subtitle">Введите ваши учётные данные для доступа к АРМ диспетчера</div>

    <!-- ОШИБКА -->
    {% if error %}
    <div class="error-message">
        <span class="icon">⚠️</span>
        {{ error }}
    </div>
    {% endif %}

    <!-- ФОРМА -->
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" placeholder="Введите логин" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Введите пароль" required>
        </div>

        <button type="submit" class="btn-login">
            Войти в систему
        </button>
    </form>

    <!-- ФУТЕР -->
    <div class="login-footer">
        Для входа используйте учётные данные, выданные администратором
    </div>
</div>

</body>
</html>
